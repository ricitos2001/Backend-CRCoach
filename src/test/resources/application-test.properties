# ===============================
# TEST PROFILE - H2 in-memory
# ===============================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.sql.init.mode=never

# Dummy mail (prevents MailSenderAutoConfiguration from failing)
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test
spring.mail.password=test

# Dummy custom properties
app.frontend.base-url=http://localhost:4200
brevo.api.key=test-api-key
brevo.sender.email=test@crcoach.com
brevo.sender.name=CRCoach Test
clash.royale.api.key=test-clash-key
clash.royale.api.url=https://api.clashroyale.com/v1
